<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Login | Cyber-Command</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Global Style -->
    <link rel="stylesheet" th:href="@{/css/cyber-command.css}">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.95)),
                url('/images/cyber_command_hud_bg.png');
            background-size: cover;
            background-position: center;
        }

        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
        }

        .login-panel {
            width: 100%;
            max-width: 480px;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control-cyber {
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid var(--glass-border) !important;
            color: #fff !important;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: 0.3s;
        }

        .form-control-cyber:focus {
            border-color: var(--cyber-blue) !important;
            box-shadow: 0 0 15px var(--cyber-blue-glow) !important;
            background: rgba(15, 23, 42, 0.8) !important;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-glow {
            font-size: 3.5rem;
            color: var(--cyber-blue);
            filter: drop-shadow(0 0 15px var(--cyber-blue));
            margin-bottom: 1rem;
        }

        .btn-cyber-submit {
            background: var(--cyber-blue);
            color: var(--bg-deep) !important;
            font-weight: 800;
            border-radius: 12px;
            padding: 1rem;
            border: none;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-cyber-submit:hover {
            box-shadow: 0 0 25px var(--cyber-blue);
            transform: scale(1.02);
        }

        .input-group-text-cyber {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-right: none;
            color: var(--cyber-blue);
            border-radius: 12px 0 0 12px;
        }

        .form-control-cyber.ps-0 {
            border-left: none !important;
            border-radius: 0 12px 12px 0;
        }
        
        .alert-cyber {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .alert-cyber-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--emerald-guard);
        }
    </style>
</head>
<body>

    <div class="grid-overlay"></div>

    <div class="login-panel">
        <div class="glass-card p-5">
            <div class="login-header">
                <i class="bi bi-shield-lock-fill logo-glow"></i>
                <h2 class="fw-800 text-uppercase mb-1" style="letter-spacing: -1px;">Cyber-Command</h2>
                <p class="text-muted small mono">Neural Intelligence Console // Restricted Access</p>
            </div>

            <!-- Alerts -->
            <div th:if="${param.registered}" class="alert alert-cyber alert-cyber-success p-3 text-center mb-4">
                <i class="bi bi-check-circle-fill me-2"></i> ACCOUNT_INITIALIZED // ACCESS_GRANTED
            </div>

            <div th:if="${param.error}" class="alert alert-cyber p-3 text-center mb-4">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> AUTH_FAILURE: INVALID_CREDENTIALS
            </div>

            <div th:if="${param.logout}" class="alert alert-cyber p-3 text-center mb-4" style="border-color: var(--cyber-blue); color: var(--cyber-blue); background: rgba(56, 189, 248, 0.05);">
                <i class="bi bi-info-circle-fill me-2"></i> SESSION_TERMINATED // LOGOUT_COMPLETE
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label small mono text-muted mb-2">OPERATOR_ID</label>
                    <div class="input-group">
                        <span class="input-group-text input-group-text-cyber"><i class="bi bi-person-badge"></i></span>
                        <input type="text" class="form-control form-control-cyber ps-0" id="username" name="username" placeholder="Username" required autofocus>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small mono text-muted mb-2">ACCESS_KEY</label>
                    <div class="input-group" id="show_hide_password">
                        <span class="input-group-text input-group-text-cyber"><i class="bi bi-key-fill"></i></span>
                        <input type="password" class="form-control form-control-cyber ps-0" id="password" name="password" placeholder="••••••••" required>
                        <a href="" class="input-group-text btn border-start-0 border-light border-opacity-10 text-muted glass-bg" style="border-radius: 0 12px 12px 0;"><i class="bi bi-eye-slash" aria-hidden="true"></i></a>
                    </div>
                </div>

                <button type="submit" class="btn-cyber-submit mb-4">Authenticate</button>
                
                <div class="text-center pt-2 border-top border-light border-opacity-10">
                    <p class="small text-muted mb-2">New Investigator?</p>
                    <a th:href="@{/register}" class="text-decoration-none fw-bold" style="color: var(--cyber-blue);">
                        Initialize Registry <i class="bi bi-arrow-right ms-1"></i>
                    </a>
                </div>
            </form>
        </div>
        <p class="text-center small text-muted mt-4 mono opacity-50">© 2026 CYBER-COMMAND PROTOCOL // GLOBAL SECURE</p>
    </div>

    <!-- Script to toggle password visibility -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $("#show_hide_password a").on('click', function(event) {
                event.preventDefault();
                if($('#show_hide_password input').attr("type") == "text"){
                    $('#show_hide_password input').attr('type', 'password');
                    $('#show_hide_password i').addClass( "bi-eye-slash" );
                    $('#show_hide_password i').removeClass( "bi-eye" );
                }else if($('#show_hide_password input').attr("type") == "password"){
                    $('#show_hide_password input').attr('type', 'text');
                    $('#show_hide_password i').removeClass( "bi-eye-slash" );
                    $('#show_hide_password i').addClass( "bi-eye" );
                }
            });
        });
    </script>
</body>
</html>
