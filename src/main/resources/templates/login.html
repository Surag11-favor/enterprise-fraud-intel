<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-COMMAND | INITIALIZE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/cyber-command.css}">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 5;
            padding: 2rem;
        }
        .form-control-glass {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1.1rem;
        }
        .form-control-glass:focus {
            background: rgba(0,243,255,0.05);
            border-color: var(--neon-cyan);
            color: #fff;
            box-shadow: 0 0 20px rgba(0,243,255,0.2);
        }
    </style>
</head>
<body>
    <div class="orbital-glow"></div>
    <div class="orbital-glow-2"></div>
    
    <div class="auth-wrapper">
        <div class="glass-panel p-5" style="width: 100%; max-width: 500px;">
            <div class="text-center mb-5">
                <i class="bi bi-hexagon-fill display-3" style="color: var(--neon-cyan); text-shadow: 0 0 20px var(--neon-cyan);"></i>
                <h2 class="fw-900 mt-3 text-white" style="letter-spacing: 2px;">SECURE LOGIN</h2>
            </div>

            <div th:if="${param.error}" class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger rounded-3 p-3 mb-4 d-flex align-items-center gap-2">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span class="small fw-bold">Invalid credentials. Auth denied.</span>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-4">
                    <label class="form-label" style="color: var(--neon-cyan); font-weight: 800; letter-spacing: 1px;">CLEARANCE ID</label>
                    <input type="text" name="username" class="form-control form-control-glass" required autofocus placeholder="Enter ID">
                </div>
                <div class="mb-5">
                    <label class="form-label" style="color: var(--neon-cyan); font-weight: 800; letter-spacing: 1px;">PASSCODE</label>
                    <input type="password" name="password" class="form-control form-control-glass" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-ultramodern w-100 border-0" style="padding: 1.2rem;">INITIALIZE SESSION</button>
                <div class="text-center mt-4">
                    <a href="/register" style="color: var(--text-dim); text-decoration: none; font-weight: 600;">Request New Access Clearance</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
