<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registry Initialization | Cyber-Command</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Global Style -->
    <link rel="stylesheet" th:href="@{/css/cyber-command.css}">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.95)),
                url('/images/cyber_command_hud_bg.png');
            background-size: cover;
            background-position: center;
            overflow-y: auto;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        @media (max-width: 576px) {
            .register-panel .glass-card { padding: 2.5rem 1.5rem !important; }
            .logo-glow { font-size: 2.2rem; }
        }

        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
        }

        .register-panel {
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control-cyber {
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid var(--glass-border) !important;
            color: #fff !important;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: 0.3s;
        }

        .form-control-cyber:focus {
            border-color: var(--cyber-blue) !important;
            box-shadow: 0 0 15px var(--cyber-blue-glow) !important;
            background: rgba(15, 23, 42, 0.8) !important;
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-glow {
            font-size: 3rem;
            color: var(--cyber-blue);
            filter: drop-shadow(0 0 15px var(--cyber-blue));
            margin-bottom: 0.5rem;
        }

        .btn-cyber-submit {
            background: var(--cyber-blue);
            color: var(--bg-deep) !important;
            font-weight: 800;
            border-radius: 12px;
            padding: 1rem;
            border: none;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-cyber-submit:hover {
            box-shadow: 0 0 25px var(--cyber-blue);
            transform: scale(1.02);
        }

        .input-group-text-cyber {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-right: none;
            color: var(--cyber-blue);
            border-radius: 12px 0 0 12px;
        }

        .form-control-cyber.ps-0 {
            border-left: none !important;
            border-radius: 0 12px 12px 0;
        }
        
        .alert-cyber {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="grid-overlay"></div>

    <div class="register-panel">
        <div class="glass-card p-5">
            <div class="register-header">
                <i class="bi bi-person-plus-fill logo-glow"></i>
                <h2 class="fw-800 text-uppercase mb-1" style="letter-spacing: -1px;">Initialize Registry</h2>
                <p class="text-muted small mono">Create Tactical Investigator Identity</p>
            </div>

            <!-- Alerts -->
            <div th:if="${param.error}" class="alert alert-cyber p-3 text-center mb-4">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> REGISTRY_ERROR: [[${param.error}]]
            </div>

            <form th:action="@{/register}" method="post">
                <div class="mb-3">
                    <label class="form-label small mono text-muted mb-2">OPERATOR_NAME</label>
                    <div class="input-group">
                        <span class="input-group-text input-group-text-cyber"><i class="bi bi-person-badge"></i></span>
                        <input type="text" class="form-control form-control-cyber ps-0" id="username" name="username" placeholder="Choose Identifier" required autofocus>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small mono text-muted mb-2">CONTACT_QUERY (EMAIL)</label>
                    <div class="input-group">
                        <span class="input-group-text input-group-text-cyber"><i class="bi bi-envelope-at-fill"></i></span>
                        <input type="email" class="form-control form-control-cyber ps-0" id="email" name="email" placeholder="name@enterprise.com" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small mono text-muted mb-2">ACCESS_KEY (PASSWORD)</label>
                    <div class="input-group">
                        <span class="input-group-text input-group-text-cyber"><i class="bi bi-key-fill"></i></span>
                        <input type="password" class="form-control form-control-cyber ps-0" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-cyber-submit mb-4">Register Operator</button>
                
                <div class="text-center pt-2 border-top border-light border-opacity-10">
                    <p class="small text-muted mb-2">Existing Auth in Database?</p>
                    <a th:href="@{/login}" class="text-decoration-none fw-bold" style="color: var(--cyber-blue);">
                        <i class="bi bi-arrow-left me-1"></i> Return to Console
                    </a>
                </div>
            </form>
        </div>
        <p class="text-center small text-muted mt-3 mono opacity-50">BY INITIALIZING REGISTRY YOU AGREE TO SECURE AUDIT PROTOCOLS.</p>
    </div>
</body>
</html>
