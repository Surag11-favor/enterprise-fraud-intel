<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorized Users | Fraud Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --sidebar-bg: #1e293b;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; }
        .sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--glass-border); position: fixed; height: 100vh; }
        .main-content { margin-left: 280px; flex-grow: 1; padding: 2rem; }
        .nav-link { display: flex; align-items: center; padding: 0.8rem 1.2rem; color: var(--text-muted) !important; border-radius: 12px; margin-bottom: 0.5rem; transition: all 0.3s; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: rgba(59, 130, 246, 0.1); color: #fff !important; }
        .nav-link.active { background: var(--accent-blue); color: #fff !important; }
        .glass-panel { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2rem; }
        .user-avatar { width: 40px; height: 40px; background: var(--accent-blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; }
        .table { color: var(--text-main); }
        .table td { border-bottom: 1px solid var(--glass-border); vertical-align: middle; padding: 1.25rem 0.5rem; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="p-4 border-bottom border-secondary mb-3">
            <a href="/dashboard" class="text-white text-decoration-none fw-800 d-flex align-items-center">
                <i class="bi bi-shield-lock-fill me-2 text-primary"></i> FRAUD INTEL
            </a>
        </div>
        <nav class="px-3">
            <a href="/dashboard" class="nav-link"><i class="bi bi-grid-fill me-2"></i> Overview</a>
            <a href="/threat-scan" class="nav-link"><i class="bi bi-eye-fill me-2"></i> Threat Scan</a>
            <a href="/mitigation-rules" class="nav-link"><i class="bi bi-shield-shaded me-2"></i> Mitigation Rules</a>
            <a href="/authorized-users" class="nav-link active"><i class="bi bi-people-fill me-2"></i> Authorized Users</a>
            <a href="/audit-logs" class="nav-link"><i class="bi bi-journal-text me-2"></i> Audit Logs</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-800">Investigator Access Control</h2>
                <p class="text-muted">Manage system administrators and authorized analysts.</p>
            </div>
            <button class="btn btn-outline-light rounded-pill px-4 fw-bold"><i class="bi bi-person-plus-fill me-2"></i> Invite User</button>
        </div>

        <div class="glass-panel">
            <table class="table">
                <thead>
                    <tr class="text-muted small uppercase">
                        <th>User</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                    <tbody>
                        <tr th:each="user : ${users}" th:id="'user-' + ${user.id}">
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="avatar-circle me-3" th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}">A</div>
                                    <div class="fw-600" th:text="${user.username}">admin_user</div>
                                </div>
                            </td>
                            <td><span class="badge bg-primary-subtle text-primary rounded-pill px-3" th:text="${user.role}">ADMIN</span></td>
                            <td class="text-muted small">Active</td>
                            <td>
                                <div class="dropdown">
                                    <button class="btn btn-link text-white-50 p-0" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                                        <i class="bi bi-three-dots-vertical"></i>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end shadow border-secondary">
                                        <li><a class="dropdown-item small" href="#"><i class="bi bi-pencil me-2"></i> Edit Details</a></li>
                                        <li><a class="dropdown-item small" href="#"><i class="bi bi-shield-lock me-2"></i> Reset Password</a></li>
                                        <li><hr class="dropdown-divider border-secondary"></li>
                                        <li><a class="dropdown-item small text-danger" href="#" th:onclick="'deleteUser(' + ${user.id} + ')'"><i class="bi bi-person-x me-2"></i> Remove Investigator</a></li>
                                    </ul>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
