# Cyber-Command Professional Data Layer (Handshake Orchestration)
spring.datasource.url=${CUSTOM_JDBC_URL:jdbc:postgresql://localhost:5432/fraud_db?sslmode=require}
spring.datasource.username=${CUSTOM_DB_USER:postgres}
spring.datasource.password=${CUSTOM_DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Explicit Dialect Override (Autonomous Mode)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Fallback: Modern Hibernate auto-detection (Universal Compatibility)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Security Core: Enforcing SSL/TLS for remote cloud connections
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# Server Port (Required for Railway)
server.port=${PORT:8080}
spring.application.name=Enterprise-Fraud-Intelligence

# Thymeleaf Configuration
spring.thymeleaf.cache=false
